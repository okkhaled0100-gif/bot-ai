services:
  - type: web
    name: ai-chat-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-5.5
